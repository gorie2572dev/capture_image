name: Release CaptureImage

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Build release archive
        run: CaptureImage/scripts/package-release.sh "${GITHUB_REF_NAME#v}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          "CaptureImage/dist/CaptureImage-${GITHUB_REF_NAME#v}.zip"
          --generate-notes
          --title "CaptureImage ${GITHUB_REF_NAME#v}"
